<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1400px;
    height: 900px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Subtle ambient glow behind phones */
  .glow {
    position: absolute;
    width: 600px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(212,175,55,0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .phones-container {
    display: flex;
    align-items: flex-end;
    gap: 40px;
    perspective: 1200px;
    position: relative;
    z-index: 1;
  }

  .phone {
    position: relative;
    width: 280px;
    border-radius: 44px;
    background: #1a1a1a;
    border: 3px solid #333;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05),
      0 25px 60px rgba(0,0,0,0.8),
      0 10px 30px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
    transform-origin: bottom center;
  }

  .phone-left {
    transform: rotateY(12deg) rotateX(2deg) rotateZ(-1deg);
  }

  .phone-right {
    transform: rotateY(-8deg) rotateX(2deg) rotateZ(1deg);
    margin-bottom: -20px;
  }

  /* Dynamic Island / Notch */
  .notch {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 28px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }

  /* Screen */
  .screen {
    width: 100%;
    aspect-ratio: 9 / 19.5;
    overflow: hidden;
    border-radius: 41px;
    position: relative;
  }

  .screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* Reflection surface */
  .reflection-surface {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.015) 0%, transparent 100%);
    pointer-events: none;
  }

  /* Phone reflections */
  .phone-reflection {
    position: absolute;
    width: 280px;
    height: 150px;
    bottom: -160px;
    border-radius: 44px;
    overflow: hidden;
    opacity: 0.08;
    filter: blur(3px);
    transform: scaleY(-1);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 80%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 80%);
  }

  .phone-reflection img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Side frame highlights */
  .phone::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 44px;
    border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none;
    z-index: 5;
  }

  /* Titanium frame effect */
  .phone::after {
    content: '';
    position: absolute;
    top: -1px;
    left: 20%;
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    z-index: 6;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="reflection-surface"></div>

  <div class="phones-container">
    <!-- Phone 1 - Craft Screen -->
    <div class="phone phone-left">
      <div class="notch"></div>
      <div class="screen">
        <img src="nextjs_space/public/showcase/app-screen-craft-mobile.jpg" alt="Craft Screen">
      </div>
      <div class="phone-reflection">
        <img src="nextjs_space/public/showcase/app-screen-craft-mobile.jpg" alt="">
      </div>
    </div>

    <!-- Phone 2 - Voice Screen -->
    <div class="phone phone-right">
      <div class="notch"></div>
      <div class="screen">
        <img src="nextjs_space/public/showcase/app-screen-voice-mobile.jpg" alt="Voice Screen">
      </div>
      <div class="phone-reflection">
        <img src="nextjs_space/public/showcase/app-screen-voice-mobile.jpg" alt="">
      </div>
    </div>
  </div>
</body>
</html>
